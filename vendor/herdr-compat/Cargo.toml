[package]
name = "herdr-compat"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "herdr_compat"
path = "src/lib.rs"

[dependencies]
bincode = { version = "2", features = ["serde"] }
crossterm = "0.29"
interprocess = "2.4.2"
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
