name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm ci --prefix web

      - run: npm run check
